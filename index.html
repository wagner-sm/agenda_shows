<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agenda de Shows</title>
  <style>
    body { background: #181818; color: #fff; font-family: Arial; }
    .shows-list { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; padding: 40px 10px; }
    .show-card { background: #282828; border-radius: 10px; width: 320px; box-shadow: 0 2px 8px #0008; margin-bottom: 20px; }
    .show-card img { width: 100%; height: 300px; object-fit: contain; background: #111; }
    .show-info { padding: 15px; }
    .show-info h2 { margin: 0 0 10px 0; color: #ffb347; }
    .show-info p { margin: 3px 0; }
    .show-info strong { color: #ffb347; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">Agenda de Shows</h1>
  <div class="shows-list" id="shows"></div>
  <<script>
  function formatarData(dataISO) {
    if (!dataISO) return '';
    const [ano, mes, dia] = dataISO.split('-');
    return `${dia}/${mes}/${ano}`;
  }

  function mostrarData(show) {
    if (show.data_inicio === show.data_fim) {
      return formatarData(show.data_inicio);
    } else {
      return `${formatarData(show.data_inicio)} a ${formatarData(show.data_fim)}`;
    }
  }

  fetch('shows.json')
    .then(res => res.json())
    .then(shows => {
      // Ordena por data de início
      shows.sort((a, b) => new Date(a.data_inicio) - new Date(b.data_inicio));
      // Pega a data de hoje, zerando horas/minutos/segundos
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);

      // Filtra só eventos futuros ou que terminam hoje
      shows = shows.filter(show => {
        const [ano, mes, dia] = show.data_fim.split('-');
        const dataFim = new Date(ano, mes - 1, dia);
        dataFim.setHours(0, 0, 0, 0); // zera horas
        return dataFim >= hoje;
      });

      const container = document.getElementById('shows');
      if (shows.length === 0) {
        container.innerHTML = `<p style="color:#ffb347;font-size:1.2rem;text-align:center;">Nenhum show cadastrado no momento.</p>`;
        return;
      }

      // Mostra todos os shows futuros
      shows.forEach(show => {
        container.innerHTML += `
          <div class="show-card">
            <img src="${show.flyer}" alt="Flyer do show de ${show.artista}">
            <div class="show-info">
              <h2>${show.artista}</h2>
              <p><strong>Data:</strong> ${mostrarData(show)}</p>
              <p><strong>Local:</strong> ${show.local}</p>
              <p><strong>Cidade:</strong> ${show.cidade}</p>
            </div>
          </div>
        `;
      });
    });
</script>
