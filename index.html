<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agenda de Shows</title>
  <style>
    body {
      background: #181818;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin-top: 30px;
    }

    .shows-list {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      padding: 40px 10px;
    }

    .show-card {
      background: #282828;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 2px 8px #0008;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .show-card:hover {
      transform: scale(1.02);
    }

    .show-card img {
      width: 100%;
      height: 300px;
      object-fit: contain;
      background: #111;
      cursor: pointer;
    }

    .show-info {
      padding: 15px;
    }

    .show-info h2 {
      margin: 0 0 10px 0;
      color: #ffb347;
    }

    .show-info p {
      margin: 3px 0;
    }

    .show-info strong {
      color: #ffb347;
    }

    /* Modal da imagem */
    #imageModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s;
    }

    #imageModal img {
      max-width: 90%;
      max-height: 90%;
      border: 5px solid #fff;
      border-radius: 10px;
      box-shadow: 0 0 20px #000;
    }

    #closeModal {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      z-index: 1001;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>Agenda de Shows</h1>
  <div class="shows-list" id="shows"></div>

  <!-- Modal de imagem -->
  <div id="imageModal">
    <span id="closeModal">&times;</span>
    <img id="modalImg" src="" alt="Imagem em tamanho real">
  </div>

<script>
  function parseDataBR(dataBR) {
    if (!dataBR) return null;
    const [dia, mes, ano] = dataBR.split('/');
    return new Date(`${ano}-${mes}-${dia}`); // Cria uma data válida
  }

  function mostrarData(show) {
    if (show.data_inicio === show.data_fim) {
      return show.data_inicio;
    } else {
      return `${show.data_inicio} a ${show.data_fim}`;
    }
  }

  fetch('shows.json')
    .then(res => res.json())
    .then(shows => {
      shows.sort((a, b) => parseDataBR(a.data_inicio) - parseDataBR(b.data_inicio));

      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);

      shows = shows.filter(show => {
        const dataFim = parseDataBR(show.data_fim);
        return dataFim >= hoje;
      });

      const container = document.getElementById('shows');
      if (shows.length === 0) {
        container.innerHTML = `<p style="color:#ffb347;font-size:1.2rem;text-align:center;">Nenhum show cadastrado no momento.</p>`;
        return;
      }

      let html = '';
      shows.forEach(show => {
        html += `
          <div class="show-card">
            <img src="imagens/${show.flyer}" alt="Flyer do show de ${show.artista}" onclick="abrirImagemModal('imagens/${show.flyer}')">
            <div class="show-info">
              <h2>${show.artista}</h2>
              <p><strong>Data:</strong> ${mostrarData(show)}</p>
              <p><strong>Local:</strong> ${show.local}</p>
              <p><strong>Cidade:</strong> ${show.cidade}</p>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    });

    // Modal JS
    function abrirImagemModal(src) {
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImg');
      modalImg.src = src;
      modal.style.display = 'flex';
    }

    document.getElementById('imageModal').addEventListener('click', function(e) {
      if (e.target.id === 'imageModal' || e.target.id === 'closeModal') {
        this.style.display = 'none';
      }
    });

    // Fechar com tecla ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('imageModal').style.display = 'none';
      }
    });
  </script>
</body>
</html>
