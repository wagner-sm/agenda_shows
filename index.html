<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agenda de Shows</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
    background: #181818;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    transition: background 0.3s, color 0.3s;
    }
    h1 {
    text-align: center;
    margin-top: 30px;
    letter-spacing: 1px;
    }
    .shows-list {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    padding: 40px 10px;
    }
    .show-card {
    background: linear-gradient(135deg, #282828 80%, #ffb34722 100%);
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 2px 8px #0008;
    margin-bottom: 20px;
    transition: transform 0.3s, box-shadow 0.3s, border 0.3s;
    border: 2px solid transparent;
    animation: fadeInUp 0.7s;
    }
    .show-card:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 24px #ffb34755;
    border: 2px solid #ffb347;
    }
    .show-card img {
    width: 100%;
    height: 300px;
    object-fit: contain;
    background: #111;
    cursor: pointer;
    border-radius: 12px 12px 0 0;
    transition: filter 0.2s;
    }
    .show-card img:hover {
    filter: brightness(1.1) saturate(1.2);
    }
    .show-info {
    padding: 15px;
    }
    .show-info h2 {
    margin: 0 0 15px 0;
    color: #ffb347;
    font-size: 1.3rem;
    }
    
    /* Novo estilo para alinhamento dos ícones */
    .info-item {
    display: flex;
    align-items: center;
    margin: 8px 0;
    gap: 12px;
    }
    
    .info-icon {
    color: #ffb347;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    }
    
    .info-text {
    flex: 1;
    margin: 0;
    }
    
    #imageModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.85);
    justify-content: center;
    align-items: center;
    z-index: 3000;
    animation: fadeIn 0.3s;
    }
    #imageModal img {
    max-width: 90%;
    max-height: 90%;
    border: 5px solid #fff;
    border-radius: 10px;
    box-shadow: 0 0 20px #000;
    }
    #closeModal {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 32px;
    color: #fff;
    cursor: pointer;
    z-index: 3001;
    background: #181818cc;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    }
    #closeModal:hover {
    background: #ffb347;
    color: #181818;
    }
    @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
    }
    @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
    }
    /* Tema claro */
    body.light-theme {
    background: #f5f5f5;
    color: #222;
    }
    body.light-theme .show-card {
    background: linear-gradient(135deg, #fff 80%, #e67e2222 100%);
    color: #222;
    box-shadow: 0 2px 8px #0002;
    }
    body.light-theme .show-info h2,
    body.light-theme .info-icon {
    color: #e67e22;
    }
    body.light-theme #closeModal {
    background: #fff8;
    color: #e67e22;
    }
    body.light-theme #closeModal:hover {
    background: #e67e22;
    color: #fff;
    }
    @media (max-width: 600px) {
    .shows-list {
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    }
    .show-card {
    width: 95vw;
    min-width: unset;
    }
    .show-card img {
    height: 180px;
    }
    }
    /* Botão de alternância de tema */
    #toggleTheme {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 2000;
    background: #282828;
    color: #ffb347;
    border: none;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 2px 8px #0005;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    }
    #toggleTheme:hover {
    background: #ffb347;
    color: #282828;
    }
  
/* Botão de voltar ao topo */
#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #fb4372 0%, #e76e22 100%);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(251, 67, 114, 0.3);
    transition: all 0.3s ease;
    z-index: 1000;
    font-size: 20px;
    color: white;
}

#backToTop:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(251, 67, 114, 0.4);
    background: linear-gradient(135deg, #e76e22 0%, #fb4372 100%);
}

#backToTop:active {
    transform: translateY(-1px);
}

#backToTop.show {
    display: flex;
}

/* Responsivo */
@media (max-width: 600px) {
    #backToTop {
    bottom: 20px;
    right: 20px;
    width: 45px;
    height: 45px;
    font-size: 18px;
    }
}
</style>
</head>
<body>  
  <button id="toggleTheme">
    <i class="fas fa-moon"></i>
  </button>
  <h1>Agenda de Shows</h1>
  <div class="shows-list" id="shows"></div>

  <!-- Modal de imagem -->
  <div id="imageModal">
    <span id="closeModal">&times;</span>
    <img id="modalImg" src="" alt="Imagem em tamanho real">
  </div>

<script>
  // Troque pela sua URL do SheetDB ou Sheet.best
  const SHEET_API_URL = 'https://sheetdb.io/api/v1/ebh8ua1mnir97';

  function parseDataBR(dataBR) {  
    if (!dataBR) return null;  
    const [dia, mes, ano] = dataBR.split('/');  
    return new Date(`${ano}-${mes.padStart(2, '0')}-${dia.padStart(2, '0')}T00:00:00`);  
  }

  function mostrarData(show) {
    if (show.data_inicio === show.data_fim || !show.data_fim) {
    return show.data_inicio;
    } else {
    return `${show.data_inicio} a ${show.data_fim}`;
    }
  }

  // Mostra mensagem de carregando
  const container = document.getElementById('shows');
  container.innerHTML = `<p style="color:#ffb347;font-size:1.2rem;text-align:center;width:100vw;">Carregando shows...</p>`;

  fetch(SHEET_API_URL)
    .then(res => res.json())
    .then(shows => {
    if (shows.data) shows = shows.data;
    shows = shows.map(show => {
    if (!show.data_fim || show.data_fim.trim() === '') {
    show.data_fim = show.data_inicio;
    }
    return show;
    });
    shows.sort((a, b) => parseDataBR(a.data_inicio) - parseDataBR(b.data_inicio));
    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    shows = shows.filter(show => {
    const dataFim = parseDataBR(show.data_fim);
    return dataFim >= hoje;
    });
    if (shows.length === 0) {
    container.innerHTML = `<p style="color:#ffb347;font-size:1.2rem;text-align:center;">Nenhum show cadastrado no momento.</p>`;
    return;
    }
    let html = '';
    shows.forEach(show => {
    html += `
    <div class="show-card" tabindex="0">
    <img src="${show.flyer}" alt="Flyer do show de ${show.artista} em ${show.cidade}" loading="lazy" onclick="abrirImagemModal('${show.flyer}')">
    <div class="show-info">
    <h2>${show.artista}</h2>
    <div class="info-item">
      <i class="fa-solid fa-calendar-days info-icon"></i>
      <p class="info-text">${mostrarData(show)}</p>
    </div>
    <div class="info-item">
      <i class="fa-solid fa-location-dot info-icon"></i>
      <p class="info-text">${show.local}</p>
    </div>
    <div class="info-item">
      <i class="fa-solid fa-city info-icon"></i>
      <p class="info-text">${show.cidade}</p>
    </div>
    </div>
    </div>
    `;
    });
    container.innerHTML = html;
    })
    .catch(() => {
    container.innerHTML = `<p style='color:#ffb347;font-size:1.2rem;text-align:center;'>Erro ao carregar os shows. Tente novamente mais tarde.</p>`;
    });

  // Modal JS
  window.abrirImagemModal = function(src) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    modalImg.src = src;
    modal.style.display = 'flex';
  }
  document.getElementById('imageModal').addEventListener('click', function(e) {
    if (e.target.id === 'imageModal' || e.target.id === 'closeModal') {
    this.style.display = 'none';
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
    document.getElementById('imageModal').style.display = 'none';
    }
  });

  // Alternância de tema
  const btnTheme = document.getElementById('toggleTheme');
  btnTheme.onclick = function() {
    document.body.classList.toggle('light-theme');
    const icon = this.querySelector('i');
    if (document.body.classList.contains('light-theme')) {
      icon.className = 'fas fa-sun';
    } else {
      icon.className = 'fas fa-moon';
    }
  };
</script>
<button id="backToTop" title="Voltar ao topo">
  <i class="fas fa-arrow-up"></i>
</button>

<script>

// Botão de voltar ao topo
window.addEventListener('scroll', function() {
    const backToTopBtn = document.getElementById('backToTop');
    if (window.pageYOffset > 300) {
    backToTopBtn.classList.add('show');
    } else {
    backToTopBtn.classList.remove('show');
    }
});

document.getElementById('backToTop').addEventListener('click', function() {
    window.scrollTo({
    top: 0,
    behavior: 'smooth'
    });
});
</script>
</body>
</html>
